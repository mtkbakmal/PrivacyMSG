<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация | PrivacyMSG</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div class="auth-wrapper">
            <div id="auth-screen" class="card auth-card">
                <div class="auth-tabs">
                    <button id="tab-login" class="auth-tab active" onclick="switchAuth('login')">Вход</button>
                    <button id="tab-register" class="auth-tab" onclick="switchAuth('register')">Регистрация</button>
                </div>
    
                <h2 id="auth-title">PrivacyMSG</h2>
    
                <form id="auth-form">
                    <input type="text" id="username" placeholder="Имя пользователя" required>
                    <input type="email" id="email" placeholder="Электронная почта" class="hidden">
                    <input type="password" id="password" placeholder="Пароль" required>
                    <button type="submit" id="auth-submit" class="btn-primary">Войти</button>
                </form>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', path='/authScript.js') }}"></script>
</body>
</html>
