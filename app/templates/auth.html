<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация | PrivacyMSG</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div id="auth-screen" class="card auth-card">
            <div class="auth-tabs">
                <button id="tab-login" class="auth-tab active" onclick="switchAuth('login')">Вход</button>
                <button id="tab-register" class="auth-tab" onclick="switchAuth('register')">Регистрация</button>
            </div>

            <h2 id="auth-title">PrivacyMSG</h2>

            <form id="auth-form">
                <input type="text" id="username" placeholder="Имя пользователя" required>
                <input type="email" id="email" placeholder="Электронная почта" class="hidden">
                <input type="password" id="password" placeholder="Пароль" required>
                <button type="submit" id="auth-submit" class="btn-primary">Войти</button>
            </form>
        </div>
    </div>

    <script>
        const authForm = document.getElementById('auth-form');
        const emailInput = document.getElementById('email');
        const authSubmitBtn = document.getElementById('auth-submit');
        let currentMode = 'login';

        function switchAuth(mode) {
            currentMode = mode;
            if (mode === 'register') {
                emailInput.classList.remove('hidden');
                emailInput.required = true;
                authSubmitBtn.innerText = 'Создать аккаунт';
                document.getElementById('tab-register').classList.add('active');
                document.getElementById('tab-login').classList.remove('active');
            } else {
                emailInput.classList.add('hidden');
                emailInput.required = false;
                authSubmitBtn.innerText = 'Войти';
                document.getElementById('tab-login').classList.add('active');
                document.getElementById('tab-register').classList.remove('active');
            }
        }

        authForm.onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const email = emailInput.value;

            const url = currentMode === 'login' ? '/login' : '/register';
            const body = currentMode === 'login' 
                ? { username, password } 
                : { username, password, email };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const result = await response.json();

                if (response.ok) {
                    if (currentMode === 'register') {
                        alert("Регистрация успешна! Теперь войдите.");
                        switchAuth('login');
                    } else {
                        // Сохраняем имя пользователя для чата (например, в localStorage)
                        localStorage.setItem('chat_username', username);
                        // Перенаправляем на страницу чата
                        window.location.href = '/chat'; 
                    }
                } else {
                    alert(result.detail || "Произошла ошибка");
                }
            } catch (error) {
                console.error("Ошибка запроса:", error);
                alert("Сервер не отвечает");
            }
        };
    </script>
</body>
</html>
