<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | PrivacyMSG</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div id="auth-screen" class="card auth-card">
            <div class="auth-tabs">
                <button id="tab-login" class="auth-tab active" onclick="switchAuth('login')">Вход</button>
                <button id="tab-register" class="auth-tab" onclick="switchAuth('register')">Регистрация</button>
            </div>

            <h2 id="auth-title">PrivacyMSG</h2>

            <form id="auth-form">
                <input type="text" id="username" placeholder="Имя пользователя" required>
                <input type="email" id="email" placeholder="Электронная почта" class="hidden">
                <input type="password" id="password" placeholder="Пароль" required>
                <button type="submit" id="auth-submit" class="btn-primary">Войти</button>
            </form>
        </div>

        <div id="chat-screen" class="messenger-container hidden">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <span id="user-display">@me</span>
                </div>
                <div class="contact-list">
                    <div class="contact active">
                        <div class="avatar">S</div>
                        <div class="contact-info">
                            <span class="name">Support Bot</span>
                            <span class="status">online</span>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="chat-main">
                <header class="chat-header">
                    <div class="current-contact">Чат с: <strong>Support Bot</strong></div>
                    <button onclick="location.reload()" class="btn-small">Выйти</button>
                </header>

                <div id="chat-messages" class="messages-area">
                    <div class="msg system">Безопасное соединение установлено.</div>
                </div>

                <form class="chat-input-area" id="message-form">
                    <input type="text" id="msg-input" placeholder="Введите сообщение..." autocomplete="off">
                    <button type="submit" id="send-btn">➤</button>
                </form>
            </main>
        </div>
    </div>

    <script>
        const authForm = document.getElementById('auth-form');
        const authScreen = document.getElementById('auth-screen');
        const chatScreen = document.getElementById('chat-screen');

        authForm.onsubmit = async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (currentMode === 'login') {
                try {
                    const response = await fetch('/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });

                    const result = await response.json();

                    if (response.ok) {
                        // Если бэкенд вернул 200 OK
                        authScreen.classList.add('hidden');
                        chatScreen.classList.remove('hidden');
                        document.getElementById('user-display').innerText = `@${username}`;
                    } else {
                        // Если бэкенд вернул ошибку (например, 401)
                        alert(result.detail || "Ошибка авторизации");
                    }
                } catch (error) {
                    console.error("Ошибка запроса:", error);
                    alert("Сервер не отвечает");
                }
            } else {
                // Здесь логика для регистрации (нужно создать эндпоинт /register)
                alert("Регистрация пока не реализована на бэкенде");
            }
        };
    </script>
</body>
</html>
